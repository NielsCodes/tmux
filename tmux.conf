set -g default-terminal "tmux-256color"

# Change prefix
set-option -g prefix C-Space
bind C-Space send-prefix

# Horizontal split
unbind %
bind '\' split-window -h -c "#{pane_current_path}"

# Vertical split
unbind '"'
bind '-' split-window -v -c "#{pane_current_path}"

bind c new-window -c "#{pane_current_path}"

# Reload Tmux config
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# Cycle windows with page up and down
unbind NPage
unbind PPage
bind -n PPage previous-window
bind -n NPage next-window

unbind Home
bind -n Home resize-pane -Z

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

bind -r m resize-pane -Z

# Prevent accidentally closing tmux with leader + d
unbind d

# Order session overview
bind s choose-tree -sZ -O name

# Disable status bar
set-option -g status off

setw -g mode-keys vi

set -g mouse on

# Clipboard: works on macOS (pbcopy), Linux X11 (xclip), Linux Wayland (wl-copy),
# and falls back to OSC 52 so remote/SSH terminals can still copy.
set -g set-clipboard on
if-shell "command -v pbcopy" {
  bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
  bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
} {
  if-shell "command -v wl-copy" {
    bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
    bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"
  } {
    if-shell "command -v xclip" {
      bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
      bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
    }
  }
}

set -g focus-events on

set -g status-style bg=colour217

# set -g status-right "%Y-%m-%d %H:%M:%S"
set-option -g message-style bg=blue,fg=white
set -wg mode-style bg=blue,fg=white

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'

set -g @continuum-restore 'on'

# Bind prefix + s to go directly to session switcher with fzf
# Custom script that sorts by last accessed (most recent at bottom for easy switching)
unbind s
bind s run-shell -b "TMUX_FZF_SESSION_FORMAT='#{session_windows}w' ~/.config/tmux/session-switcher.sh"

# Keep at bottom
run '~/.tmux/plugins/tpm/tpm'
